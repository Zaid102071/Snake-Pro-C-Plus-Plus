name: Build Snake Pro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.config }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        config: [Release, Debug]
        include:
          - os: ubuntu-latest
            cmake_generator: "Unix Makefiles"
            artifact_name: snake-pro-linux
          - os: windows-latest
            cmake_generator: "Visual Studio 17 2022"
            artifact_name: snake-pro-windows
          - os: macos-latest
            cmake_generator: "Unix Makefiles"
            artifact_name: snake-pro-macos
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'
      
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      
      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G "${{ matrix.cmake_generator }}"
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
      
      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel
      
      - name: Install
        run: cmake --install build --config ${{ matrix.config }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ matrix.config }}
          path: install/
          retention-days: 30
  
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            snake-pro-linux-Release/**
            snake-pro-windows-Release/**
            snake-pro-macos-Release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
