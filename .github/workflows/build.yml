name: Build Snake Pro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Windows (${{ matrix.config }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Copy executable
        run: |
          mkdir -p output
          copy build\snake-pro.exe output\snake-pro-${{ matrix.config }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-pro-${{ matrix.config }}
          path: output/snake-pro-${{ matrix.config }}.exe
          retention-days: 90
          compression-level: 0
